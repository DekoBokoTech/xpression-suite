<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>情報 | DBT XPression 学習ノート</title>
<style>
:root{--bg:#FAF9F6;--panel:#FFFFFF;--panel2:#F0EDE7;--line:#EAE6DD;--ink:#1B1B1A;--sub:#8A8983;--accent:#F26A1B}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);line-height:1.8;font-family:-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif}
header{background:#fff;border-bottom:1px solid var(--line);padding:12px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:5}
header .brand{display:flex;align-items:center;gap:8px;font-weight:800;color:var(--ink);font-size:15px;text-decoration:none}
header .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--accent)}
.hbtns{margin-left:auto;display:flex;gap:8px}
header a.back,header button.lang{font-size:12.5px;color:var(--ink);text-decoration:none;border:1px solid var(--line);border-radius:9px;padding:6px 12px;background:#fff;cursor:pointer;box-shadow:2px 2px 6px rgba(120,102,72,.10),-2px -2px 6px rgba(255,255,255,.85)}
header a.back{color:var(--accent)}
main{max-width:820px;margin:0 auto;padding:26px 18px 70px}
h1{font-size:24px;margin:.2em 0 .1em}
.lead{color:var(--sub);font-size:14px;margin:0 0 18px}
.toc{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 24px}
.toc a{font-size:12.5px;color:var(--accent);text-decoration:none;border:1px solid var(--line);border-radius:20px;padding:6px 13px;background:#fff;box-shadow:2px 2px 6px rgba(120,102,72,.10),-2px -2px 6px rgba(255,255,255,.85)}
section{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px 22px;margin:0 0 16px;box-shadow:4px 4px 10px rgba(120,102,72,.13),-4px -4px 10px rgba(255,255,255,.85);scroll-margin-top:70px}
section h2{font-size:17px;margin:0 0 12px;border-left:4px solid var(--accent);padding-left:10px}
table.kv{width:100%;border-collapse:collapse;font-size:14px}
table.kv th{text-align:left;color:var(--sub);font-weight:600;width:150px;vertical-align:top;padding:7px 10px 7px 0}
table.kv td{padding:7px 0;vertical-align:top}
a{color:var(--accent)}
p{margin:.5em 0;font-size:14px}
.sub{color:var(--sub);font-size:13px}
ul.log{list-style:none;padding:0;margin:6px 0}
ul.log li{border-left:3px solid var(--accent);padding:4px 0 4px 12px;margin:10px 0}
ul.log li b{font-size:14px}
ul.log li span{display:block;font-size:13px;color:var(--sub)}
.note{background:#FFF3EA;border:1px solid #F6D8C1;border-radius:10px;padding:10px 14px;font-size:13px;color:#8a5a30;margin:10px 0}
footer{border-top:1px solid var(--line);padding:22px 16px;text-align:center;color:var(--sub);font-size:12px}
.orgrow{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:8px}
.orglink{font-size:12px;color:var(--accent);text-decoration:none;border:1px solid var(--line);border-radius:20px;padding:5px 12px;background:#fff}
</style>
</head>
<body>
<header>
  <a class="brand" href="index.html"><span class="dot"></span>DBT XPression 学習ノート</a>
  <div class="hbtns">
    <button class="lang" id="langBtn" onclick="toggleLang()">EN</button>
    <a class="back" id="backBtn" href="index.html">▲ トップへ戻る</a>
  </div>
</header>
<main id="infomain"></main>
<footer>
  <div class="orgrow">
    <a class="orglink" id="f_site" href="https://dekobokotech.com/" target="_blank" rel="noopener">公式サイト ↗</a>

let LANG=localStorage.getItem('xpr_lang')||'ja';
function kvTable(rows){return `<table class="kv">${rows.map(r=>`<tr><th>${r[0]}</th><td>${r[1]}</td></tr>`).join('')}</table>`;}
function render(){
  const d=C[LANG];document.documentElement.lang=LANG;document.title=d.docTitle;
  document.getElementById('backBtn').textContent=d.back;
  document.getElementById('langBtn').textContent=d.lang;
  document.getElementById('f_site').textContent=d.f_site;
  document.getElementById('f_shop').textContent=d.f_shop;
  document.getElementById('f_copy').textContent=d.copy;
  const ids=['operator','contact','terms','privacy','history'];
  document.getElementById('infomain').innerHTML=`
    <h1>${d.h1}</h1>
    <p class="lead">${d.lead}</p>
    <div class="toc">${d.toc.map((t,i)=>`<a href="#${ids[i]}">${t}</a>`).join('')}</div>

function toggleLang(){LANG=LANG==='ja'?'en':'ja';localStorage.setItem('xpr_lang',LANG);render();}

</html>
